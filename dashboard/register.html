<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Bookmark Vault</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 0 0 16px;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.5;
    }
    a.btn, button {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 11px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      color: #111827;
      background: #fff;
      box-sizing: border-box;
      cursor: pointer;
    }
    .github {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }
    .google {
      background: #fff;
      color: #111827;
    }
    .msg {
      margin-top: 14px;
      font-size: 13px;
      color: #374151;
    }
    .error {
      margin-top: 12px;
      color: #b91c1c;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login with OAuth</h1>
    <p>Use Google or GitHub. No local password is stored.</p>
    <a class="btn google" href="/auth/google">Continue with Google</a>
    <a class="btn github" href="/auth/github">Continue with GitHub</a>
    <div id="msg" class="msg">Checking current session...</div>
    <div id="err" class="error"></div>
  </div>

  <script>
    const msg = document.getElementById("msg");
    const err = document.getElementById("err");
    const params = new URLSearchParams(window.location.search);
    const failure = params.get("error");
    if (failure) {
      err.textContent = `OAuth failed: ${failure}`;
    }

    (async () => {
      try {
        const res = await fetch("/api/me", { credentials: "include" });
        const json = await res.json();
        if (json.success) {
          msg.textContent = `Logged in as ${json.data.name}${json.data.email ? ` (${json.data.email})` : ""}.`;
        } else {
          msg.textContent = "Not logged in yet.";
        }
      } catch {
        msg.textContent = "Unable to check session.";
      }
    })();
  </script>
</body>
</html>
