<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Bookmark Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --bg-a: #f4f7fb;
      --bg-b: #ecf1f8;
      --panel: #ffffff;
      --line: #d7dee8;
      --text: #0f172a;
      --muted: #4b5563;
      --accent: #111827;
      --accent-2: #e8eef8;
      --danger: #b91c1c;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 20% 18%, #dbe7ff 0, transparent 34%),
        radial-gradient(circle at 80% 84%, #d8f3ec 0, transparent 32%),
        linear-gradient(160deg, var(--bg-a), var(--bg-b));
    }

    .modal-shell {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-head {
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      padding: 18px 20px 14px;
    }

    .modal-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      font: 700 10px "JetBrains Mono", monospace;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--accent-2);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .modal-body {
      padding: 16px 20px 20px;
      display: grid;
      gap: 10px;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      background: #fff;
      box-sizing: border-box;
      cursor: pointer;
      transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
    }

    a.btn:hover {
      border-color: #9aaab9;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.1);
    }

    .github {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .google {
      background: #fff;
      color: var(--text);
    }

    .footer-links {
      margin-top: 2px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
    }

    .footer-links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-weight: 700;
    }

    .footer-links a:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .msg {
      font-size: 13px;
      color: #374151;
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fbfcfe;
    }

    .error {
      color: var(--danger);
      font-size: 13px;
      min-height: 18px;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .modal-shell {
        border-radius: 14px;
      }

      .modal-head,
      .modal-body {
        padding-left: 14px;
        padding-right: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <div class="modal-head">
      <span class="modal-tag"><i class="fa-solid fa-shield-halved" aria-hidden="true"></i>Secure Login</span>
      <h1 id="loginTitle">Login with OAuth</h1>
      <p>Use Google or GitHub. No local password is stored.</p>
    </div>
    <div class="modal-body">
      <a class="btn google" href="/auth/google"><i class="fa-brands fa-google" aria-hidden="true"></i>Continue with Google</a>
      <a class="btn github" href="/auth/github"><i class="fa-brands fa-github" aria-hidden="true"></i>Continue with GitHub</a>
      <div id="msg" class="msg">Checking current session...</div>
      <div id="err" class="error"></div>
      <div class="footer-links">
        <a href="/" aria-label="Go back to dashboard"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i>Back to Dashboard</a>
      </div>
    </div>
  </div>

  <script>
    const msg = document.getElementById("msg");
    const err = document.getElementById("err");
    const params = new URLSearchParams(window.location.search);
    const failure = params.get("error");
    if (failure) {
      err.textContent = `OAuth failed: ${failure}`;
    }

    (async () => {
      try {
        const res = await fetch("/api/me", { credentials: "include" });
        const json = await res.json();
        if (json.success) {
          msg.textContent = `Logged in as ${json.data.name}${json.data.email ? ` (${json.data.email})` : ""}.`;
        } else {
          msg.textContent = "Not logged in yet.";
        }
      } catch {
        msg.textContent = "Unable to check session.";
      }
    })();
  </script>
</body>
</html>
