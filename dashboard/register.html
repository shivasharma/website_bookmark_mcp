<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - LinkSync AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --bg-a: #0b1624;
      --bg-b: #091220;
      --panel: #112237;
      --line: #26445f;
      --line-hi: #3d607f;
      --text: #f3f8ff;
      --muted: #9bb6cf;
      --primary: #1b4f72;
      --accent: #10d0b0;
      --accent-2: #53a8f4;
      --danger: #ff6b6b;
      --shadow: 0 24px 55px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "DM Sans", sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 20% 18%, rgba(16, 208, 176, 0.14) 0, transparent 34%),
        radial-gradient(circle at 80% 84%, rgba(83, 168, 244, 0.14) 0, transparent 32%),
        linear-gradient(160deg, var(--bg-a), var(--bg-b));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.14;
      pointer-events: none;
    }

    .modal-shell {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(17, 34, 55, 0.88);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .modal-head {
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(19, 38, 60, 0.96) 0%, rgba(20, 40, 65, 0.92) 100%);
      padding: 20px 22px 16px;
    }

    .modal-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      padding: 4px 10px;
      font: 700 10.5px "Syne", sans-serif;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #0b1a2a;
      background: linear-gradient(135deg, #7ec4ff, #6be8d1);
      box-shadow: 0 6px 16px rgba(99, 193, 250, 0.35);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-family: "Syne", sans-serif;
      line-height: 1.2;
      letter-spacing: -0.2px;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .modal-body {
      padding: 18px 22px 22px;
      display: grid;
      gap: 11px;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      background: var(--panel);
      box-sizing: border-box;
      cursor: pointer;
      transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease, background-color .2s ease;
    }

    a.btn:hover {
      border-color: var(--line-hi);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    }

    .github {
      background: var(--accent);
      color: #0d1b2a;
      border-color: var(--accent);
    }

    .github:hover {
      background: #27dfc0;
      border-color: #27dfc0;
    }

    .google i {
      color: var(--accent);
    }

    .google {
      background: var(--panel);
      color: var(--text);
    }

    .google:hover {
      background: #162b44;
    }

    .footer-links {
      margin-top: 2px;
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
    }

    .footer-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(17, 34, 55, 0.75);
      transition: border-color .2s ease, transform .2s ease, background-color .2s ease;
    }

    .footer-links a:hover {
      color: var(--text);
      text-decoration: none;
      border-color: var(--line-hi);
      background: #1a324d;
      transform: translateY(-1px);
    }

    .msg {
      font-size: 13px;
      color: #bdd1e4;
      border: 1px solid #31506d;
      border-radius: 10px;
      padding: 10px 11px;
      background: rgba(21, 42, 67, 0.72);
    }

    .error {
      color: var(--danger);
      font-size: 13px;
      min-height: 18px;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .modal-shell {
        border-radius: 16px;
      }

      .modal-head,
      .modal-body {
        padding-left: 14px;
        padding-right: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <div class="modal-head">
      <span class="modal-tag"><i class="fa-solid fa-shield-halved" aria-hidden="true"></i>Secure Login</span>
      <h1 id="loginTitle">Login with OAuth</h1>
      <p>Use Google or GitHub. No local password is stored.</p>
    </div>
    <div class="modal-body">
      <a class="btn google" href="/auth/google"><i class="fa-brands fa-google" aria-hidden="true"></i>Continue with Google</a>
      <a class="btn github" href="/auth/github"><i class="fa-brands fa-github" aria-hidden="true"></i>Continue with GitHub</a>
      <div id="msg" class="msg">Checking current session...</div>
      <div id="err" class="error"></div>
      <div class="footer-links">
        <a href="/dashboard/index.html" aria-label="Go back to dashboard"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i>Back to Dashboard</a>
      </div>
    </div>
  </div>

  <script>
    const msg = document.getElementById("msg");
    const err = document.getElementById("err");
    const params = new URLSearchParams(window.location.search);
    const failure = params.get("error");
    if (failure) {
      err.textContent = `OAuth failed: ${failure}`;
    }

    (async () => {
      try {
        const res = await fetch("/api/me", { credentials: "include" });
        const json = await res.json();
        if (json.success) {
          msg.textContent = `Logged in as ${json.data.name}${json.data.email ? ` (${json.data.email})` : ""}.`;
        } else {
          msg.textContent = "Not logged in yet.";
        }
      } catch {
        msg.textContent = "Unable to check session.";
      }
    })();
  </script>
</body>
</html>
