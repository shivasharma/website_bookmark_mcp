<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markd System Health</title>
  <style>
    :root {
      --bg: #080e17;
      --surface: #111e2d;
      --surface-2: #162539;
      --border: #1a3048;
      --text: #eef5ff;
      --muted: #7aa3c4;
      --accent: #06c0e0;
      --ok: #00d4a0;
      --warn: #f5a623;
      --danger: #f05252;
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(6, 192, 224, 0.08), transparent 40%), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      font-family: "Sora", "Segoe UI", sans-serif;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover { border-color: #224060; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-family: "Sora", "Segoe UI", sans-serif;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(100px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .kpi {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }

    .kpi .k {
      text-transform: uppercase;
      letter-spacing: 0.7px;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .kpi .v {
      font-size: 24px;
      font-weight: 800;
      font-family: "Sora", "Segoe UI", sans-serif;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    .service {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }

    .service-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }

    .service-name {
      margin: 0;
      font-size: 13px;
      word-break: break-word;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .pill {
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: capitalize;
      border: 1px solid transparent;
    }

    .running { background: rgba(0, 212, 160, 0.14); color: var(--ok); border-color: rgba(0, 212, 160, 0.3); }
    .restarting { background: rgba(245, 166, 35, 0.14); color: var(--warn); border-color: rgba(245, 166, 35, 0.3); }
    .stopped { background: rgba(240, 82, 82, 0.14); color: var(--danger); border-color: rgba(240, 82, 82, 0.3); }

    code {
      font-family: Consolas, "Courier New", monospace;
      color: #8fd8ff;
    }

    @media (max-width: 900px) {
      .kpis { grid-template-columns: repeat(2, minmax(100px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 class="title">System Health</h1>
        <p class="sub">Docker overview and API health from the old dashboard health workspace.</p>
      </div>
      <div>
        <a class="btn" href="/bookmarks">Back to Bookmarks</a>
        <button class="btn" id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>

    <section class="card">
      <h2>Docker Overview</h2>
      <div class="kpis" id="kpiWrap"></div>
      <p class="sub">Clean view enabled: port mappings and startup commands are intentionally hidden.</p>
      <div class="services" id="serviceWrap"></div>
    </section>

    <section class="card">
      <h2>Service Health</h2>
      <p class="sub" id="healthStatus">API status: checking...</p>
    </section>


  </div>

  <script>
    const SERVICES = [
      { id: "5f1e810ed89f", name: "bookmark_certbot", image: "certbot/certbot:latest", status: "restarting", health: "degraded", uptime: "Restarting (2), recent restart" },
      { id: "4c635d674cae", name: "bookmark_app", image: "ghcr.io/shivasharma/website_bookmark_mcp:latest", status: "running", health: "healthy", uptime: "Up 10 minutes (healthy)" },
      { id: "c4ace7c43db3", name: "bookmark_nginx", image: "nginx:alpine", status: "running", health: "healthy", uptime: "Up 10 minutes" },
      { id: "0ecd54eda46f", name: "bookmark_postgres", image: "postgres:16-alpine", status: "running", health: "healthy", uptime: "Up 21 hours (healthy)" }
    ];

    function renderOverview() {
      const total = SERVICES.length;
      const running = SERVICES.filter((s) => s.status === "running").length;
      const healthy = SERVICES.filter((s) => s.health === "healthy").length;
      const restarting = SERVICES.filter((s) => s.status === "restarting").length;

      document.getElementById("kpiWrap").innerHTML = [
        ["Containers", total],
        ["Running", running],
        ["Healthy", healthy],
        ["Restarting", restarting]
      ].map(([k, v]) => `<div class="kpi"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");

      document.getElementById("serviceWrap").innerHTML = SERVICES.map((s) => {
        const healthLabel = s.health === "healthy" ? "Healthy" : "Needs attention";
        return `<article class="service"><div class="service-head"><h3 class="service-name">${s.name}</h3><span class="pill ${s.status}">${s.status}</span></div><div class="meta">Container: <code>${s.id.slice(0, 12)}</code></div><div class="meta">Image: ${s.image}</div><div class="meta">State: ${s.uptime}</div><div class="meta">Health: ${healthLabel}</div></article>`;
      }).join("");
    }

    async function loadApiHealth() {
      const node = document.getElementById("healthStatus");
      node.textContent = "API status: checking...";
      try {
        const response = await fetch("/api/health", { credentials: "include" });
        const payload = await response.json().catch(() => null);
        if (response.ok && payload && payload.success) {
          node.innerHTML = "API status: <strong>OK</strong>";
          return;
        }
      } catch {}
      node.innerHTML = "API status: <strong>Unavailable</strong>";
    }

    document.getElementById("refreshBtn").addEventListener("click", async () => {
      renderOverview();
      await loadApiHealth();
    });

    renderOverview();
    loadApiHealth();
  </script>
</body>
</html>
