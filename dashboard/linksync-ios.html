<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>LinkSync AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#007AFF;--indigo:#5856D6;--purple:#AF52DE;
  --orange:#FF9500;--green:#34C759;--red:#FF3B30;--pink:#FF2D55;
  --bg1:#F2F2F7;--bg2:#FFFFFF;
  --l1:#1C1C1E;--l2:#3A3A3C;--l3:rgba(60,60,67,.6);--l4:rgba(60,60,67,.28);
  --sep:rgba(60,60,67,.12);
  --r-md:12px;--r-lg:16px;--r-xl:20px;
  --sb:240px;--tabh:82px;
}
html,body{height:100%;font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg1);color:var(--l1);-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── APP SHELL ── */
.app{display:flex;height:100vh;overflow:hidden;position:relative}

/* ── OVERLAY (mobile drawer backdrop) ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;backdrop-filter:blur(2px)}
.overlay.show{display:block}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sb);flex-shrink:0;
  background:rgba(242,242,247,.92);
  backdrop-filter:saturate(180%) blur(24px);
  -webkit-backdrop-filter:saturate(180%) blur(24px);
  border-right:.5px solid rgba(60,60,67,.18);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:300;
}
.logo-area{padding:20px 16px 14px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--indigo));display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,122,255,.35)}
.logo-mark svg{width:15px;height:15px}
.logo-text{font-size:14px;font-weight:700;color:var(--l1);letter-spacing:-.3px}
.logo-text em{font-style:normal;color:var(--blue)}
.close-sb{margin-left:auto;display:none;width:28px;height:28px;border-radius:50%;background:rgba(120,120,128,.15);align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0}
.close-sb svg{width:12px;height:12px}

.nav-scroll{flex:1;overflow-y:auto;padding:8px 10px 0;scrollbar-width:none}
.nav-scroll::-webkit-scrollbar{display:none}
.nav-sec-lbl{font-size:11px;font-weight:600;color:var(--l3);letter-spacing:.04em;text-transform:uppercase;padding:10px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r-md);cursor:pointer;transition:background .12s;color:var(--l2);font-size:13.5px;font-weight:500;margin-bottom:1px;user-select:none}
.nav-item:active{background:rgba(0,0,0,.06)}
.nav-item:hover{background:rgba(0,0,0,.04)}
.nav-item.active{background:var(--blue);color:#fff}
.ni-icon{width:15px;height:15px;flex-shrink:0;opacity:.6}
.nav-item.active .ni-icon{opacity:1}
.ni-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ni-badge{margin-left:auto;font-size:10px;font-weight:600;background:rgba(0,0,0,.07);color:var(--l3);padding:1px 7px;border-radius:20px}
.nav-item.active .ni-badge{background:rgba(255,255,255,.25);color:#fff}
.nav-sep{height:.5px;background:var(--sep);margin:8px 6px}

.sb-bottom{padding:12px 16px;border-top:.5px solid var(--sep);display:flex;align-items:center;gap:10px}
.user-ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:12.5px;font-weight:600;color:var(--l1)}
.user-plan{font-size:11px;color:var(--l3)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg1);min-width:0}

/* ── TOPBAR ── */
.topbar{
  flex-shrink:0;
  background:rgba(242,242,247,.9);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid rgba(60,60,67,.18);
  display:flex;align-items:center;padding:0 16px;gap:10px;
  height:52px;
}
.ham-btn{width:32px;height:32px;display:none;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;border-radius:8px;flex-shrink:0}
.ham-btn:active{background:rgba(0,0,0,.06)}
.ham-btn svg{width:16px;height:16px}
.page-ttl{font-size:16px;font-weight:700;color:var(--l1);letter-spacing:-.3px;white-space:nowrap}
.search-wrap{flex:1;background:rgba(118,118,128,.12);border-radius:10px;display:flex;align-items:center;padding:0 10px;gap:6px;transition:background .15s;min-width:0}
.search-wrap:focus-within{background:rgba(118,118,128,.2)}
.search-wrap svg{width:13px;height:13px;flex-shrink:0;color:rgba(60,60,67,.45)}
.search-wrap input{flex:1;border:none;background:transparent;font-size:13px;font-family:inherit;color:var(--l1);outline:none;padding:7px 0;min-width:0}
.search-wrap input::placeholder{color:rgba(60,60,67,.38)}
.topbar-actions{display:flex;gap:7px;flex-shrink:0}
.tb-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .12s;white-space:nowrap}
.tb-btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 1px 6px rgba(0,122,255,.28)}
.btn-ghost{background:rgba(118,118,128,.12);color:var(--l2)}
.btn-icon{width:33px;height:33px;padding:0;justify-content:center;border-radius:10px}
.tb-btn svg{width:12px;height:12px}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(16px + var(--tabh));scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.08) transparent}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:rgba(0,0,0,.08);border-radius:4px}

/* ── BOTTOM TAB BAR ── */
.tab-bar{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:var(--tabh);
  background:rgba(242,242,247,.95);
  backdrop-filter:saturate(180%) blur(24px);
  -webkit-backdrop-filter:saturate(180%) blur(24px);
  border-top:.5px solid rgba(60,60,67,.18);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));
  z-index:100;
}
.tab-bar-inner{display:flex;justify-content:space-around;align-items:center;height:100%}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 12px;border-radius:10px;transition:all .12s;flex:1;user-select:none}
.tab-item:active{background:rgba(0,0,0,.05);transform:scale(.93)}
.tab-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.tab-icon svg{width:22px;height:22px;color:var(--l3);transition:color .12s}
.tab-label{font-size:10px;font-weight:500;color:var(--l3);transition:color .12s}
.tab-item.active .tab-icon svg{color:var(--blue)}
.tab-item.active .tab-label{color:var(--blue);font-weight:600}

/* ── COMPONENTS ── */
.ios-card{background:var(--bg2);border-radius:var(--r-xl);overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.04),0 2px 10px rgba(0,0,0,.04)}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border-radius:var(--r-xl);padding:14px 16px;box-shadow:0 1px 0 rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04);transition:transform .15s;cursor:default}
.stat-card:active{transform:scale(.98)}
.stat-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.stat-ic svg{width:16px;height:16px}
.stat-num{font-size:22px;font-weight:700;color:var(--l1);letter-spacing:-.4px;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:11px;color:var(--l3);font-weight:500}
.stat-dl{font-size:10.5px;font-weight:600;margin-top:5px;padding:2px 7px;border-radius:20px;display:inline-block}
.dl-up{background:rgba(52,199,89,.12);color:var(--green)}
.dl-dn{background:rgba(255,59,48,.1);color:var(--red)}

/* Two col */
.two-col{display:grid;grid-template-columns:1fr 290px;gap:14px}

/* Section */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-ttl{font-size:14px;font-weight:700;color:var(--l1)}
.sec-link{font-size:13px;font-weight:500;color:var(--blue);cursor:pointer;padding:4px 0}
.sec-link:active{opacity:.6}

/* Link list */
.link-list{background:var(--bg2);border-radius:var(--r-xl);overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04)}
.link-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:.5px solid var(--sep);cursor:pointer;transition:background .1s;-webkit-user-select:none;user-select:none}
.link-row:last-child{border-bottom:none}
.link-row:active{background:rgba(0,122,255,.04)}
.lk-fav{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.lk-body{flex:1;min-width:0}
.lk-title{font-size:13.5px;font-weight:600;color:var(--l1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lk-url{font-size:11.5px;color:var(--l3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.lk-foot{display:flex;align-items:center;gap:5px;margin-top:6px;flex-wrap:wrap}
.lk-col{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.lk-tag{padding:2px 6px;background:rgba(118,118,128,.1);border-radius:5px;font-size:10.5px;font-weight:500;color:var(--l2);white-space:nowrap}
.lk-date{font-size:11px;color:var(--l4);flex-shrink:0;margin-left:auto;white-space:nowrap}
.lk-chev{flex-shrink:0;opacity:.22;margin-left:3px}
.lk-chev svg{width:11px;height:11px;display:block}

/* Panel */
.panel{background:var(--bg2);border-radius:var(--r-xl);overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04);margin-bottom:14px}
.panel:last-child{margin-bottom:0}
.panel-hdr{padding:14px 16px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between}
.panel-ttl{font-size:14px;font-weight:700;color:var(--l1)}
.panel-body{padding:14px 16px}
.form-field{margin-bottom:12px}
.form-lbl{font-size:11px;font-weight:600;color:var(--l3);letter-spacing:.03em;text-transform:uppercase;margin-bottom:5px}
.form-input{width:100%;padding:10px 13px;background:rgba(118,118,128,.1);border:none;border-radius:10px;font-size:14px;font-family:inherit;color:var(--l1);outline:none;transition:background .12s;-webkit-appearance:none;appearance:none}
.form-input::placeholder{color:var(--l4)}
.form-input:focus{background:rgba(118,118,128,.18)}
.btn-full{width:100%;justify-content:center;padding:11px 14px;font-size:14px;border-radius:12px;margin-top:4px}

/* Activity */
.act-row{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:.5px solid var(--sep)}
.act-row:last-child{border-bottom:none}
.act-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.act-msg{font-size:12.5px;color:var(--l2);line-height:1.45}
.act-msg strong{color:var(--l1);font-weight:600}
.act-time{font-size:11px;color:var(--l4);margin-top:2px}

/* Collections */
.col-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.col-card{background:var(--bg2);border-radius:var(--r-xl);padding:16px;cursor:pointer;transition:transform .15s;box-shadow:0 1px 0 rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04)}
.col-card:active{transform:scale(.97)}
.col-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:11px}
.col-ico svg{width:20px;height:20px}
.col-name{font-size:13.5px;font-weight:700;color:var(--l1);margin-bottom:2px}
.col-n{font-size:12px;color:var(--l3)}

/* API Keys */
.key-card{background:var(--bg2);border-radius:var(--r-xl);overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04);margin-bottom:10px}
.key-row{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:.5px solid var(--sep)}
.key-row:last-child{border-bottom:none}
.key-name{font-size:13.5px;font-weight:600;color:var(--l1)}
.key-val{font-size:11px;color:var(--l3);font-family:monospace;margin-top:2px}
.key-stat{padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;margin-left:auto;flex-shrink:0}
.ks-live{background:rgba(52,199,89,.12);color:var(--green)}
.ks-off{background:rgba(118,118,128,.1);color:var(--l3)}

/* MCP */
.mcp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.mcp-s{background:var(--bg2);border-radius:var(--r-xl);padding:14px 16px;box-shadow:0 1px 0 rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04)}
.mcp-sv{font-size:18px;font-weight:700;color:var(--l1);letter-spacing:-.2px}
.mcp-sl{font-size:11.5px;color:var(--l3);margin-top:2px}
.tool-card{background:var(--bg2);border-radius:var(--r-lg);padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 0 rgba(0,0,0,.03),0 1px 6px rgba(0,0,0,.03)}
.tool-nm{font-size:13px;font-weight:700;color:var(--l1);font-family:monospace}
.tool-ds{font-size:11.5px;color:var(--l3);margin-top:1px}
.method{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;font-family:monospace;margin-left:auto;flex-shrink:0}
.m-get{background:rgba(52,199,89,.12);color:var(--green)}
.m-post{background:rgba(0,122,255,.1);color:var(--blue)}
.m-del{background:rgba(255,59,48,.1);color:var(--red)}

/* Settings */
.set-grp{background:var(--bg2);border-radius:var(--r-xl);overflow:hidden;margin-bottom:14px;box-shadow:0 1px 0 rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04)}
.set-row{display:flex;align-items:center;padding:14px 16px;border-bottom:.5px solid var(--sep);cursor:pointer;transition:background .1s}
.set-row:last-child{border-bottom:none}
.set-row:active{background:rgba(0,0,0,.03)}
.set-lbl{font-size:14px;font-weight:500;color:var(--l1)}
.set-sub{font-size:12px;color:var(--l3);margin-top:2px}
.set-val{margin-left:auto;font-size:13px;color:var(--l3)}
.toggle{width:44px;height:26px;border-radius:13px;cursor:pointer;margin-left:auto;flex-shrink:0;transition:background .22s;display:flex;align-items:center;padding:3px}
.ton{background:var(--green)}
.tof{background:rgba(120,120,128,.25)}
.tknob{width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.22);transition:transform .22s}
.ton .tknob{transform:translateX(18px)}
.set-grp-lbl{font-size:12px;font-weight:600;color:var(--l3);padding:14px 16px 4px;text-transform:uppercase;letter-spacing:.04em}

/* Live dot */
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;box-shadow:0 0 0 2px rgba(52,199,89,.18);animation:ld 2s ease-in-out infinite;margin-right:5px}
@keyframes ld{0%,100%{opacity:1}50%{opacity:.3}}

/* Page anim */
.pv{animation:pf .18s ease}
@keyframes pf{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* FAB (mobile add button) */
.fab{
  display:none;
  position:fixed;right:18px;bottom:calc(var(--tabh) + 14px);
  width:52px;height:52px;border-radius:50%;
  background:var(--blue);color:#fff;
  box-shadow:0 4px 16px rgba(0,122,255,.4);
  align-items:center;justify-content:center;
  cursor:pointer;border:none;
  z-index:150;transition:transform .15s;
}
.fab:active{transform:scale(.92)}
.fab svg{width:22px;height:22px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .close-sb{display:flex}
  .ham-btn{display:flex}
  .search-wrap{max-width:none}
  .topbar-actions .tb-btn:not(.btn-icon){display:none}
  .tab-bar{display:block}
  .fab{display:flex}
  .content{padding:14px 14px calc(14px + var(--tabh))}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .two-col{grid-template-columns:1fr}
  .col-grid{grid-template-columns:repeat(2,1fr)}
  .mcp-grid{grid-template-columns:repeat(3,1fr)}
  .stat-num{font-size:20px}
  .stat-card{padding:13px 14px}
  .page-ttl{font-size:15px}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .col-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .mcp-grid{grid-template-columns:repeat(2,1fr)}
  .link-row{padding:12px 14px;gap:10px}
  .lk-fav{width:34px;height:34px;font-size:13px}
}
@media(min-width:769px){
  .tab-bar{display:none}
  .fab{display:none}
  .ham-btn{display:none}
  .close-sb{display:none}
}

/* Tablet tweaks */
@media(max-width:1100px) and (min-width:769px){
  .two-col{grid-template-columns:1fr}
}
@media(max-width:960px) and (min-width:769px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .col-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="logo-area">
      <div class="logo-mark">
        <svg fill="none" viewBox="0 0 15 15"><path d="M2 7.5C2 5 4 3 6.5 3H8.5C11 3 13 5 13 7.5S11 12 8.5 12H6.5" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/><path d="M6.5 7.5H3.5M3.5 7.5l2-2M3.5 7.5l2 2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="logo-text">Link<em>Sync</em> AI</div>
      <button class="close-sb" onclick="closeSidebar()">
        <svg fill="none" viewBox="0 0 12 12"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="nav-scroll">
      <div class="nav-sec-lbl">Workspace</div>
      <div class="nav-item active" data-route="dashboard" onclick="navTo(this)">
        <svg class="ni-icon" fill="none" viewBox="0 0 15 15"><rect x="1" y="1" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".85"/><rect x="8.5" y="1" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".5"/><rect x="1" y="8.5" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".5"/><rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".28"/></svg>
        Dashboard
      </div>
      <div class="nav-item" data-route="links" onclick="navTo(this)">
        <svg class="ni-icon" fill="none" viewBox="0 0 15 15"><path d="M2 4h11M2 7.5h8M2 11h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        All Links<span class="ni-badge">1,247</span>
      </div>
      <div class="nav-item" data-route="collections" onclick="navTo(this)">
        <svg class="ni-icon" fill="none" viewBox="0 0 15 15"><path d="M1.5 5.5h3.5v8H1.5zM5.8 5.5h3.4v8H5.8zM10 5.5h3.5v8H10z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M1 4h13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Collections<span class="ni-badge">6</span>

  el.classList.add('active');
  const route=el.dataset.route;
  if(route)renderRoute(route);
  syncTabs(route);
  closeSidebar();
}

function tabTo(el){
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const route=el.dataset.route;
  renderRoute(route);
  syncSidebar(route);
}

function syncTabs(route){
  document.querySelectorAll('.tab-item').forEach(t=>{
    t.classList.toggle('active',t.dataset.route===route);
  });
}
function syncSidebar(route){
  document.querySelectorAll('.nav-item[data-route]').forEach(n=>{
    n.classList.toggle('active',n.dataset.route===route);
  });
}

function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow='';
}

renderRoute('dashboard');
</script>
</body>
</html>
