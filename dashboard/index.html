<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Vault Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060a14;
      --bg2: #0d1322;
      --panel: rgba(16, 24, 38, 0.88);
      --panel-soft: rgba(20, 30, 46, 0.74);
      --line: rgba(123, 153, 206, 0.26);
      --text: #ebf1ff;
      --muted: #9fafcc;
      --accent: #5fd8ff;
      --accent2: #77f1c0;
      --danger: #ff7b9f;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(900px 500px at 88% 8%, rgba(255, 103, 63, 0.28), transparent 64%),
        radial-gradient(760px 460px at 18% 96%, rgba(57, 141, 255, 0.2), transparent 60%),
        linear-gradient(150deg, #0a1020 0%, #070b15 50%, #050911 100%);
    }

    .layout {
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 18px;
      height: 100vh;
      padding: 18px;
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(30, 36, 54, 0.78), rgba(11, 16, 25, 0.86));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px 14px;
      border-bottom: 1px solid rgba(136, 164, 218, 0.23);
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #8db8ff);
      color: #08131f;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
    }

    .brand p {
      margin: 1px 0 0;
      font-size: 11px;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
    }

    .label {
      margin: 8px 10px 2px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.3px;
      font-weight: 700;
    }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav a {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      transition: all .2s ease;
    }

    .nav a:hover {
      border-color: rgba(125, 163, 231, 0.34);
      background: rgba(76, 110, 183, 0.17);
    }

    .nav a.active {
      border-color: rgba(137, 188, 255, 0.5);
      background: linear-gradient(90deg, rgba(59, 105, 194, 0.35), rgba(35, 60, 115, 0.28));
      box-shadow: 0 8px 20px rgba(15, 34, 74, 0.34);
    }

    .kbd {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--muted);
      border: 1px solid rgba(127, 156, 211, 0.3);
      border-radius: 8px;
      padding: 1px 6px;
    }

    .side-note {
      margin-top: auto;
      border-top: 1px solid rgba(136, 164, 218, 0.23);
      padding: 12px 10px 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    .topbar {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .topbar h2 { margin: 0; font-size: 20px; font-weight: 800; }
    .topbar p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }

    .pill {
      border-radius: 999px;
      border: 1px solid rgba(125, 199, 255, 0.38);
      background: rgba(44, 98, 175, 0.24);
      color: #cde9ff;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      padding: 6px 11px;
      font-weight: 700;
    }

    .content {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      overflow: auto;
      padding: 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .card {
      border: 1px solid rgba(125, 158, 219, 0.24);
      border-radius: 12px;
      padding: 12px;
      background: linear-gradient(145deg, rgba(29, 42, 64, 0.6), rgba(16, 24, 38, 0.78));
    }

    .card .name {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .card .value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(122, 152, 206, 0.22);
    }

    .table th, .table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(122, 152, 206, 0.15);
      text-align: left;
      font-size: 13px;
    }

    .table th {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
      background: rgba(19, 28, 43, 0.8);
    }

    .table tr:last-child td { border-bottom: 0; }

    .actions { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }

    .btn {
      border: 1px solid rgba(120, 157, 221, 0.32);
      background: rgba(40, 68, 118, 0.24);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: all .2s ease;
    }

    .btn:hover { border-color: rgba(145, 196, 255, .55); background: rgba(57, 95, 166, 0.35); }
    .btn.primary { border-color: rgba(110, 212, 255, 0.5); background: linear-gradient(135deg, rgba(66, 155, 215, 0.48), rgba(63, 114, 199, 0.34)); }

    .muted { color: var(--muted); }
    .mono { font-family: "JetBrains Mono", monospace; }
    .good { color: var(--accent2); }
    .bad { color: var(--danger); }

    @media (max-width: 1024px) {
      .layout { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      .main { min-height: 72vh; }
      .cards { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 680px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">BV</div>
        <div>
          <h1>Bookmark Vault</h1>
          <p>Dashboard</p>
        </div>
      </div>

      <div class="label">Workspace</div>
      <nav class="nav" id="nav"></nav>

      <div class="side-note">Use the menu to switch sections. Each section has its own route URL.</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="title">Dashboard</h2>
          <p id="subtitle">Overview</p>
        </div>
        <span class="pill" id="routePill">/dashboard/bookmarks</span>
      </header>

      <section class="content" id="content"></section>
    </main>
  </div>

  <script>
    const routes = {
      bookmarks: {
        label: 'Bookmarks',
        subtitle: 'Recent bookmarks and quick actions',
        key: 'A',
        render: renderBookmarksView,
      },
      mcp: {
        label: 'MCP Setup',
        subtitle: 'Generate token and client config',
        key: 'B',
        render: renderMcpView,
      },
      account: {
        label: 'Account',
        subtitle: 'Authentication and session',
        key: 'C',
        render: renderAccountView,
      },
      health: {
        label: 'System Health',
        subtitle: 'Service health and diagnostics',
        key: 'D',
        render: renderHealthView,
      },
    };

    function getSectionFromPath() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (parts[0] !== 'dashboard') return 'bookmarks';
      return parts[1] && routes[parts[1]] ? parts[1] : 'bookmarks';
    }

    function buildNav(activeSection) {
      const nav = document.getElementById('nav');
      nav.innerHTML = Object.entries(routes).map(([section, cfg]) => {
        const active = section === activeSection ? 'active' : '';
        return `<a class="${active}" href="/dashboard/${section}" data-section="${section}"><span>${cfg.label}</span><span class="kbd">${cfg.key}</span></a>`;
      }).join('');

      Array.from(nav.querySelectorAll('a')).forEach((a) => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          const section = a.dataset.section;
          navigate(section);
        });
      });
    }

    async function navigate(section, push = true) {
      const cfg = routes[section] || routes.bookmarks;
      const path = `/dashboard/${section}`;
      if (push && window.location.pathname !== path) history.pushState({}, '', path);

      document.getElementById('title').textContent = cfg.label;
      document.getElementById('subtitle').textContent = cfg.subtitle;
      document.getElementById('routePill').textContent = path;
      buildNav(section);
      document.getElementById('content').innerHTML = `<div class="muted">Loading...</div>`;
      await cfg.render(document.getElementById('content'));
    }

    window.addEventListener('popstate', () => navigate(getSectionFromPath(), false));

    async function safeJson(url, options = undefined) {
      const res = await fetch(url, options);
      const json = await res.json().catch(() => ({}));
      return { ok: res.ok, status: res.status, json };
    }

    async function renderBookmarksView(root) {
      const [bookmarksRes, statsRes] = await Promise.all([
        safeJson('/api/bookmarks', { credentials: 'include' }),
        safeJson('/api/stats', { credentials: 'include' }),
      ]);

      if (bookmarksRes.status === 401) {
        root.innerHTML = `
          <h3>Login required</h3>
          <p class="muted">Please sign in to manage bookmarks.</p>
          <div class="actions"><a class="btn primary" href="/register">Go to Login</a></div>
        `;
        return;
      }

      const bookmarks = Array.isArray(bookmarksRes.json.data) ? bookmarksRes.json.data.slice(0, 10) : [];
      const stats = statsRes.json?.data || { total: 0, favorites: 0, recent: 0 };

      root.innerHTML = `
        <div class="cards">
          <div class="card"><div class="name">Total</div><div class="value">${stats.total ?? 0}</div></div>
          <div class="card"><div class="name">Favorites</div><div class="value">${stats.favorites ?? 0}</div></div>
          <div class="card"><div class="name">This Week</div><div class="value">${stats.recent ?? 0}</div></div>
        </div>

        <table class="table">
          <thead><tr><th>Title</th><th>URL</th><th>Tags</th></tr></thead>
          <tbody>
            ${bookmarks.length ? bookmarks.map((b) => `
              <tr>
                <td>${escapeHtml(b.title || '(untitled)')}</td>
                <td class="mono">${escapeHtml(b.url || '')}</td>
                <td>${Array.isArray(b.tags) ? b.tags.map(escapeHtml).join(', ') : ''}</td>
              </tr>
            `).join('') : '<tr><td colspan="3" class="muted">No bookmarks yet.</td></tr>'}
          </tbody>
        </table>

        <div class="actions">
          <a class="btn primary" href="/app">Open Full Bookmark App</a>
          <a class="btn" href="/mcp-setup">Open MCP Setup</a>
        </div>
      `;
    }

    async function renderMcpView(root) {
      root.innerHTML = `
        <h3>MCP Setup</h3>
        <p class="muted">Generate token and copy client configuration from the setup page.</p>
        <div class="actions">
          <a class="btn primary" href="/mcp-setup">Open MCP Setup Page</a>
        </div>
      `;
    }

    async function renderAccountView(root) {
      const me = await safeJson('/api/me', { credentials: 'include' });
      if (!me.ok) {
        root.innerHTML = `
          <h3>Account</h3>
          <p class="muted">You are not signed in.</p>
          <div class="actions"><a class="btn primary" href="/register">Sign In</a></div>
        `;
        return;
      }

      const user = me.json.data || {};
      root.innerHTML = `
        <h3>Account</h3>
        <p><strong>Name:</strong> ${escapeHtml(user.name || '-')}</p>
        <p><strong>Email:</strong> ${escapeHtml(user.email || '-')}</p>
        <p><strong>Provider:</strong> ${escapeHtml(user.auth_provider || '-')}</p>
        <div class="actions">
          <button class="btn" id="logoutBtn">Logout</button>
          <a class="btn" href="/register">Open Login Page</a>
        </div>
      `;
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await fetch('/api/logout', { method: 'POST', credentials: 'include' });
        navigate('account', false);
      });
    }

    async function renderHealthView(root) {
      const health = await safeJson('/api/health');
      const ok = health.ok && health.json?.success;
      root.innerHTML = `
        <h3>System Health</h3>
        <p>Status: <strong class="${ok ? 'good' : 'bad'}">${ok ? 'OK' : 'Unhealthy'}</strong></p>
        <pre class="mono" style="white-space: pre-wrap; color: var(--muted);">${escapeHtml(JSON.stringify(health.json, null, 2))}</pre>
      `;
    }

    function escapeHtml(input) {
      return String(input)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    navigate(getSectionFromPath(), false);
  </script>
</body>
</html>
