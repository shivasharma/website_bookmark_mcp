<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --surface2: #1c1c1f;
      --border: #2a2a2e;
      --accent: #f0e040;
      --accent2: #40e0a0;
      --danger: #ff4d6d;
      --text: #e8e8e0;
      --muted: #6b6b70;
      --radius: 8px;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ── Header ── */
    header {
      padding: 32px 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 120px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card:nth-child(1)::before { background: var(--accent); }
    .stat-card:nth-child(2)::before { background: var(--accent2); }
    .stat-card:nth-child(3)::before { background: #a78bfa; }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      font-family: 'Fira Mono', monospace;
      color: var(--text);
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
    }

    input[type="text"], input[type="url"], textarea, select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, input[type="url"]:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }

    .search-input {
      width: 100%;
      padding: 10px 14px 10px 38px;
    }

    .filter-select {
      padding: 10px 14px;
      cursor: pointer;
    }

    .btn {
      padding: 10px 18px;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { background: #ffe600; transform: translateY(-1px); }

    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .btn-ghost.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(240,224,64,0.08);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      padding: 6px 10px;
      font-size: 12px;
    }
    .btn-danger:hover { border-color: var(--danger); background: rgba(255,77,109,0.08); }

    /* ── Bookmarks Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: #3a3a3e;
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .favicon {
      width: 28px; height: 28px;
      border-radius: 5px;
      background: var(--surface2);
      flex-shrink: 0;
      object-fit: contain;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 2px;
      line-height: 1;
      opacity: 0.5;
      transition: opacity 0.15s, transform 0.15s;
    }
    .fav-btn:hover { opacity: 1; transform: scale(1.2); }
    .fav-btn.active { opacity: 1; }

    .card-url {
      font-family: 'Fira Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 12px;
      color: #8a8a90;
      line-height: 1.6;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(240,224,64,0.1);
      color: var(--accent);
      border: 1px solid rgba(240,224,64,0.2);
      cursor: pointer;
    }
    .tag:hover { background: rgba(240,224,64,0.2); }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .card-date {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Fira Mono', monospace;
    }

    .card-actions { display: flex; gap: 4px; }

    .action-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 5px;
      transition: all 0.15s;
    }
    .action-btn:hover { border-color: var(--border); color: var(--text); }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty p { font-size: 14px; }

    /* ── Loading ── */
    .loading {
      grid-column: 1/-1;
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-family: 'Fira Mono', monospace;
      font-size: 13px;
    }
    .loading::after {
      content: '...';
      animation: dots 1.2s infinite;
    }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeOverlay 0.2s ease;
    }
    @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 520px;
      padding: 28px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 14px;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ── Toast ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      max-width: 300px;
      animation: toastIn 0.25s ease, toastOut 0.25s ease 2.75s forwards;
    }
    .toast.error { border-left-color: var(--danger); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(20px); }
    }

    /* ── ID badge ── */
    .id-badge {
      font-family: 'Fira Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 3px;
      position: absolute;
      top: 12px;
      right: 12px;
    }

    /* ── Notes preview ── */
    .notes-preview {
      font-size: 11px;
      color: #6b6b88;
      background: rgba(167,139,250,0.05);
      border-left: 2px solid #a78bfa;
      padding: 6px 10px;
      border-radius: 0 4px 4px 0;
      margin-bottom: 12px;
      font-style: italic;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">🔖</div>
        <h1>Bookmark<span>Vault</span></h1>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <a href="/register" class="btn btn-ghost" style="text-decoration:none">Register</a>
        <button class="btn btn-primary" onclick="openAddModal()">
          <span>+</span> Add Bookmark
        </button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Favorites</div>
        <div class="stat-value" id="statFavs">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Week</div>
        <div class="stat-value" id="statWeek">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search bookmarks…" oninput="debounceLoad()" />
      </div>
      <input type="text" id="tagFilter" placeholder="Filter by tag…"
        style="padding:10px 14px;width:160px;" oninput="debounceLoad()" />
      <button class="btn btn-ghost" id="favToggle" onclick="toggleFavFilter()">⭐ Favorites</button>
    </div>

    <!-- Grid -->
    <div class="grid" id="bookmarkGrid">
      <div class="loading">Loading bookmarks test</div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Add / Edit Modal -->
  <div class="overlay" id="modal" style="display:none" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-title" id="modalTitle">🔖 Save Bookmark</div>

      <div class="form-group">
        <label>URL *</label>
        <input type="url" id="fUrl" placeholder="https://example.com" />
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="fTitle" placeholder="Page title" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="fDesc" placeholder="What is this page about?"></textarea>
      </div>
      <div class="form-group">
        <label>Tags <span style="font-weight:400;text-transform:none;letter-spacing:0">(comma separated)</span></label>
        <input type="text" id="fTags" placeholder="ai, tools, design" />
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Your personal notes…" style="min-height:60px"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitForm()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    let editingId = null;
    let showFavs = false;
    let debounceTimer = null;

    // ── Load ──────────────────────────────────────────────────────────────────

    async function loadBookmarks() {
      const search = document.getElementById('searchInput').value.trim();
      const tag = document.getElementById('tagFilter').value.trim();
      const grid = document.getElementById('bookmarkGrid');
      grid.innerHTML = '<div class="loading">Loading bookmarks</div>';

      try {
        const params = new URLSearchParams();
        if (search) params.set('search', search);
        if (tag) params.set('tag', tag);
        if (showFavs) params.set('favorite', 'true');

        const res = await fetch(`${API}/bookmarks?${params}`);
        if (res.status === 401) {
          showAuthRequired();
          return;
        }
        if (!res.ok) throw new Error(`API error ${res.status}`);

        const { data } = await res.json();
        renderBookmarks(Array.isArray(data) ? data : []);
      } catch {
        grid.innerHTML = `<div class="empty"><div class="empty-icon">[!]</div><h3>Cannot connect to API</h3><p>Make sure the server is running on port 3001</p></div>`;
      }
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API}/stats`);
        if (res.status === 401 || !res.ok) return;
        const { data } = await res.json();
        document.getElementById('statTotal').textContent = data.total;
        document.getElementById('statFavs').textContent = data.favorites;
        document.getElementById('statWeek').textContent = data.recent;
      } catch {}
    }

    function debounceLoad() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(loadBookmarks, 300);
    }

    // ── Render ────────────────────────────────────────────────────────────────

    function renderBookmarks(bookmarks) {
      const grid = document.getElementById('bookmarkGrid');
      if (!Array.isArray(bookmarks)) {
        showAuthRequired();
        return;
      }
      if (!bookmarks.length) {
        grid.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><h3>No bookmarks found</h3><p>Save your first link or adjust your filters</p></div>`;
        return;
      }

      grid.innerHTML = bookmarks.map(b => `
        <div class="card" id="card-${b.id}">
          <span class="id-badge">#${b.id}</span>

          <div class="card-header">
            <img class="favicon" src="${b.favicon || `https://www.google.com/s2/favicons?domain=${getDomain(b.url)}&sz=64`}"
              onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22/>'"/>
            <div class="card-title">${escHtml(b.title || b.url)}</div>
            <button class="fav-btn ${b.is_favorite ? 'active' : ''}" onclick="toggleFav(${b.id}, ${b.is_favorite})"
              title="${b.is_favorite ? 'Unfavorite' : 'Favorite'}">⭐</button>
          </div>

          <div class="card-url">
            <a href="${escHtml(b.url)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">
              ${escHtml(b.url)}
            </a>
          </div>

          ${b.description ? `<div class="card-desc">${escHtml(b.description)}</div>` : ''}
          ${b.notes ? `<div class="notes-preview">📓 ${escHtml(b.notes)}</div>` : ''}

          ${b.tags.length ? `<div class="tags">${b.tags.map(t =>
            `<span class="tag" onclick="filterByTag('${t}')">${escHtml(t)}</span>`
          ).join('')}</div>` : ''}

          <div class="card-footer">
            <span class="card-date">${formatDate(b.created_at)}</span>
            <div class="card-actions">
              <button class="action-btn" onclick="openEditModal(${b.id})" title="Edit">✏️</button>
              <button class="action-btn btn-danger" onclick="deleteBookmark(${b.id})" title="Delete">🗑</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function showAuthRequired() {
      const grid = document.getElementById('bookmarkGrid');
      grid.innerHTML = `<div class="empty"><div class="empty-icon">[LOCK]</div><h3>Login required</h3><p>Please <a href="/register" style="color:inherit;text-decoration:underline">sign in with Google or GitHub</a> to view bookmarks.</p></div>`;
    }

    // ── CRUD ──────────────────────────────────────────────────────────────────

    async function submitForm() {
      const url = document.getElementById('fUrl').value.trim();
      if (!url) { toast('URL is required', true); return; }

      const body = {
        url,
        title: document.getElementById('fTitle').value.trim(),
        description: document.getElementById('fDesc').value.trim(),
        tags: document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean),
        notes: document.getElementById('fNotes').value.trim(),
      };

      try {
        const endpoint = editingId ? `${API}/bookmarks/${editingId}` : `${API}/bookmarks`;
        const method = editingId ? 'PATCH' : 'POST';
        const res = await fetch(endpoint, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        closeModal();
        toast(editingId ? '✅ Bookmark updated!' : '✅ Bookmark saved!');
        loadBookmarks(); loadStats();
      } catch (e) { toast(e.message, true); }
    }

    async function deleteBookmark(id) {
      if (!confirm('Delete this bookmark?')) return;
      try {
        await fetch(`${API}/bookmarks/${id}`, { method: 'DELETE' });
        document.getElementById(`card-${id}`)?.remove();
        toast('🗑️ Deleted');
        loadStats();
      } catch { toast('Error deleting', true); }
    }

    async function toggleFav(id, current) {
      try {
        await fetch(`${API}/bookmarks/${id}`, {
          method: 'PATCH',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ is_favorite: !current })
        });
        loadBookmarks(); loadStats();
      } catch { toast('Error', true); }
    }

    // ── Modal ─────────────────────────────────────────────────────────────────

    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = '🔖 Save Bookmark';
      ['fUrl','fTitle','fDesc','fTags','fNotes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('modal').style.display = 'flex';
    }

    async function openEditModal(id) {
      editingId = id;
      document.getElementById('modalTitle').textContent = `✏️ Edit Bookmark #${id}`;
      try {
        const res = await fetch(`${API}/bookmarks/${id}`);
        const { data: b } = await res.json();
        document.getElementById('fUrl').value = b.url;
        document.getElementById('fTitle').value = b.title || '';
        document.getElementById('fDesc').value = b.description || '';
        document.getElementById('fTags').value = (b.tags || []).join(', ');
        document.getElementById('fNotes').value = b.notes || '';
        document.getElementById('modal').style.display = 'flex';
      } catch { toast('Error loading bookmark', true); }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function closeModalOutside(e) { if (e.target.id === 'modal') closeModal(); }

    // ── Filters ───────────────────────────────────────────────────────────────

    function toggleFavFilter() {
      showFavs = !showFavs;
      document.getElementById('favToggle').classList.toggle('active', showFavs);
      loadBookmarks();
    }

    function filterByTag(tag) {
      document.getElementById('tagFilter').value = tag;
      loadBookmarks();
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function getDomain(url) {
      try { return new URL(url).hostname; } catch { return ''; }
    }

    function formatDate(str) {
      const d = new Date(str);
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function toast(msg, error = false) {
      const el = document.createElement('div');
      el.className = 'toast' + (error ? ' error' : '');
      el.textContent = msg;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    loadBookmarks();
    loadStats();
    setInterval(() => { loadBookmarks(); loadStats(); }, 10000); // auto-refresh every 10s
  </script>
</body>
</html>
