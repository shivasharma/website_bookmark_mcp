<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Vault Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-0: #080c14;
      --bg-1: #101626;
      --bg-2: #1a1f2d;
      --panel: rgba(20, 26, 38, 0.76);
      --panel-2: rgba(16, 22, 34, 0.9);
      --text: #e9eefb;
      --muted: #9ca9c7;
      --accent: #55d8ff;
      --accent-2: #79f2bf;
      --border: rgba(126, 151, 196, 0.25);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at 90% 10%, rgba(255, 125, 77, 0.28), transparent 60%),
        radial-gradient(700px 460px at 20% 92%, rgba(64, 170, 255, 0.20), transparent 60%),
        linear-gradient(160deg, #0b1020 0%, #070b15 48%, #050912 100%);
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 18px;
      padding: 18px;
      height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(31, 37, 53, 0.75), rgba(11, 16, 26, 0.82));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 14px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px 14px;
      border-bottom: 1px solid rgba(140, 160, 206, 0.2);
    }

    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #7db5ff);
      color: #07111f;
      font-weight: 800;
      display: grid;
      place-items: center;
    }

    .brand h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .brand p {
      margin: 1px 0 0;
      font-size: 11px;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
    }

    .section-title {
      margin: 8px 10px 2px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 700;
    }

    .nav-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 4px;
    }

    .nav-btn {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      border-radius: 10px;
      font: inherit;
      font-size: 14px;
      text-align: left;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      border-color: rgba(129, 164, 230, 0.35);
      background: rgba(80, 114, 181, 0.14);
    }

    .nav-btn.active {
      border-color: rgba(141, 196, 255, 0.5);
      background: linear-gradient(90deg, rgba(60, 105, 196, 0.38), rgba(37, 66, 122, 0.26));
      box-shadow: 0 8px 20px rgba(18, 39, 83, 0.38);
    }

    .nav-hint {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--muted);
      border: 1px solid rgba(120, 152, 209, 0.28);
      border-radius: 8px;
      padding: 1px 6px;
    }

    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid rgba(140, 160, 206, 0.2);
      padding: 12px 10px 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    .topbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .topbar p {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .chip {
      border: 1px solid rgba(120, 197, 255, 0.38);
      background: rgba(58, 104, 178, 0.2);
      color: #c8e8ff;
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 12px;
      font-weight: 700;
      font-family: "JetBrains Mono", monospace;
    }

    .content {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #0a0d16;
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto;
        min-height: 100vh;
      }
      .sidebar { gap: 10px; }
      .nav-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .main { min-height: 70vh; }
    }

    @media (max-width: 640px) {
      .nav-list { grid-template-columns: 1fr; }
      .topbar h2 { font-size: 16px; }
      .chip { display: none; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">BV</div>
        <div>
          <h1>Bookmark Vault</h1>
          <p>Control Center</p>
        </div>
      </div>

      <div class="section-title">Workspace</div>
      <ul class="nav-list">
        <li><button class="nav-btn active" data-target="/app" data-title="Bookmarks" data-subtitle="Save, search, and organize links"><span>Bookmarks</span><span class="nav-hint">A</span></button></li>
        <li><button class="nav-btn" data-target="/mcp-setup" data-title="MCP Setup" data-subtitle="Generate tokens and client config"><span>MCP Setup</span><span class="nav-hint">B</span></button></li>
        <li><button class="nav-btn" data-target="/register" data-title="Account" data-subtitle="Sign in with OAuth providers"><span>Account</span><span class="nav-hint">C</span></button></li>
      </ul>

      <div class="section-title">Quick Links</div>
      <ul class="nav-list">
        <li><button class="nav-btn" data-target="/api/health" data-title="System Health" data-subtitle="Live API health endpoint"><span>System Health</span><span class="nav-hint">D</span></button></li>
      </ul>

      <div class="sidebar-footer">
        Tip: Use the left navigation to switch modules without leaving the dashboard.
      </div>
    </aside>

    <section class="main">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">Bookmarks</h2>
          <p id="pageSubtitle">Save, search, and organize links</p>
        </div>
        <div class="chip">Dashboard</div>
      </header>

      <div class="content">
        <iframe id="contentFrame" src="/app" title="Dashboard Content"></iframe>
      </div>
    </section>
  </div>

  <script>
    const buttons = Array.from(document.querySelectorAll('.nav-btn'));
    const frame = document.getElementById('contentFrame');
    const titleEl = document.getElementById('pageTitle');
    const subtitleEl = document.getElementById('pageSubtitle');

    function activate(btn) {
      buttons.forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      frame.src = btn.dataset.target;
      titleEl.textContent = btn.dataset.title || 'Dashboard';
      subtitleEl.textContent = btn.dataset.subtitle || '';
    }

    buttons.forEach((btn) => {
      btn.addEventListener('click', () => activate(btn));
    });
  </script>
</body>
</html>
