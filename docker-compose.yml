services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookmark_mcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookmark_mcp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bookmark_mcp
      SESSION_SECRET: change-me-in-prod
      ALLOW_LOCAL_FALLBACK: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/auth/google/callback}
      CLIENT_ID_GITHUB: ${CLIENT_ID_GITHUB:-}
      CLIENT_SECRET_GITHUB: ${CLIENT_SECRET_GITHUB:-}
      CALLBACK_URL_GITHUB: ${CALLBACK_URL_GITHUB:-http://localhost:3001/auth/github/callback}
    ports:
      - "3001:3001"

volumes:
  postgres_data:
