services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: bookmark_postgres
    environment:
      POSTGRES_DB: bookmark_mcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookmark_mcp"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bookmark_network
    security_opt:
      - no-new-privileges:true

  app:
    image: ${APP_IMAGE:-bookmark-app:local}
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    container_name: bookmark_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/bookmark_mcp
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-prod}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ai.shivaprogramming.com,http://localhost:3001,http://127.0.0.1:3001}
      ALLOW_LOCAL_FALLBACK: "false"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://ai.shivaprogramming.com/auth/google/callback}
      CLIENT_ID_GITHUB: ${CLIENT_ID_GITHUB:-}
      CLIENT_SECRET_GITHUB: ${CLIENT_SECRET_GITHUB:-}
      CALLBACK_URL_GITHUB: ${CALLBACK_URL_GITHUB:-https://ai.shivaprogramming.com/auth/github/callback}
    expose:
      - "3001"
    networks:
      - bookmark_network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    container_name: bookmark_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker-data/letsencrypt:/etc/letsencrypt:ro
      - ./docker-data/certbot-www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - bookmark_network
    security_opt:
      - no-new-privileges:true

  certbot:
    image: certbot/certbot:latest
    container_name: bookmark_certbot
    volumes:
      - ./docker-data/letsencrypt:/etc/letsencrypt
      - ./docker-data/certbot-www:/var/www/certbot
    command: sh -c "trap exit TERM; while :; do sleep 12h; certbot renew --webroot -w /var/www/certbot || true; done"
    depends_on:
      - nginx
    networks:
      - bookmark_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  bookmark_network:
    driver: bridge
