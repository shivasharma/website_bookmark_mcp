name: Fast Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Grants permission to upload to GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Log in to GitHub's Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push the image to GitHub
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      # Tell the VPS to pull the new image and restart
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Log in to GHCR on the VPS so it can pull the image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker pull ghcr.io/${{ github.repository }}:latest
            
            docker stop bookmark-app || true
            docker rm bookmark-app || true
            
            docker run -d \
              --name bookmark-app \
              --restart always \
              -p 3001:3001 \
              -v /opt/bookmark-data:/app/server/data \
              ghcr.io/${{ github.repository }}:latest