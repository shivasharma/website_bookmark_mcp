name: Fast Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Grants permission to upload to GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Log in to GitHub's Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push the image to GitHub
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      # Tell the VPS to pull the new image and restart
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            if [ -z "${{ secrets.POSTGRES_PASSWORD }}" ]; then
              echo "Missing required secret: POSTGRES_PASSWORD"
              exit 1
            fi
            if [ -z "${{ secrets.SESSION_SECRET }}" ]; then
              echo "Missing required secret: SESSION_SECRET"
              exit 1
            fi
            HAS_GITHUB=false
            HAS_GOOGLE=false
            if [ -n "${{ secrets.CLIENT_ID_GITHUB }}" ] && [ -n "${{ secrets.CLIENT_SECRET_GITHUB }}" ] && [ -n "${{ secrets.CALLBACK_URL_GITHUB }}" ]; then
              HAS_GITHUB=true
            fi
            if [ -n "${{ secrets.GOOGLE_CLIENT_ID }}" ] && [ -n "${{ secrets.GOOGLE_CLIENT_SECRET }}" ] && [ -n "${{ secrets.GOOGLE_CALLBACK_URL }}" ]; then
              HAS_GOOGLE=true
            fi
            if [ "$HAS_GITHUB" = false ] && [ "$HAS_GOOGLE" = false ]; then
              echo "Missing OAuth config: configure GitHub or Google OAuth secrets"
              exit 1
            fi

            # Log in to GHCR on the VPS so it can pull the image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker pull ghcr.io/${{ github.repository }}:latest
            
            # Recreate app + postgres stack
            docker network create bookmark-net || true
            docker volume create bookmark-postgres-data || true
            mkdir -p /opt/bookmark-proxy
            mkdir -p /opt/bookmark-tls

            if ! command -v openssl >/dev/null 2>&1; then
              echo "openssl is required on VPS to generate default TLS cert"
              exit 1
            fi

            if [ ! -f /opt/bookmark-tls/server.key ] || [ ! -f /opt/bookmark-tls/server.crt ]; then
              openssl req -x509 -nodes -newkey rsa:2048 \
                -keyout /opt/bookmark-tls/server.key \
                -out /opt/bookmark-tls/server.crt \
                -days 365 \
                -subj "/CN=66.179.137.126"
            fi

            cat > /opt/bookmark-proxy/nginx.conf <<'EOF'
            events {}
            http {
              server {
                listen 3001 ssl;
                ssl_certificate /etc/nginx/certs/server.crt;
                ssl_certificate_key /etc/nginx/certs/server.key;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers on;

                location / {
                  proxy_pass http://bookmark-app:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
                }
              }
            }
            EOF

            docker stop bookmark-app || true
            docker rm bookmark-app || true
            docker stop bookmark-postgres || true
            docker rm bookmark-postgres || true
            docker stop bookmark-proxy || true
            docker rm bookmark-proxy || true

            docker run -d \
              --name bookmark-postgres \
              --restart always \
              --network bookmark-net \
              -e "POSTGRES_DB=bookmark_mcp" \
              -e "POSTGRES_USER=postgres" \
              -e "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" \
              -v bookmark-postgres-data:/var/lib/postgresql/data \
              postgres:16-alpine

            until docker exec bookmark-postgres pg_isready -U postgres -d bookmark_mcp; do
              echo "Waiting for postgres..."
              sleep 2
            done

            docker run -d \
              --name bookmark-app \
              --restart always \
              --network bookmark-net \
              -e "NODE_ENV=production" \
              -e "HOST=0.0.0.0" \
              -e "PORT=3001" \
              -e "DATABASE_URL=postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@bookmark-postgres:5432/bookmark_mcp" \
              -e "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" \
              -e "SESSION_COOKIE_SECURE=true" \
              -e "ALLOW_LOCAL_FALLBACK=false" \
              -e "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e "GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}" \
              -e "CLIENT_ID_GITHUB=${{ secrets.CLIENT_ID_GITHUB }}" \
              -e "CLIENT_SECRET_GITHUB=${{ secrets.CLIENT_SECRET_GITHUB }}" \
              -e "CALLBACK_URL_GITHUB=${{ secrets.CALLBACK_URL_GITHUB }}" \
              ghcr.io/${{ github.repository }}:latest

            docker run -d \
              --name bookmark-proxy \
              --restart always \
              --network bookmark-net \
              -p 3001:3001 \
              -v /opt/bookmark-proxy/nginx.conf:/etc/nginx/nginx.conf:ro \
              -v /opt/bookmark-tls:/etc/nginx/certs:ro \
              nginx:1.27-alpine
