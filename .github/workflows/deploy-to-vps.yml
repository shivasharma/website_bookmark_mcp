name: Deploy to VPS

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  DEPLOY_DIR: /opt/website_bookmark_mcp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
            APP_IMAGE="ghcr.io/${{ github.repository }}:latest"

            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            if [ -d "$DEPLOY_DIR/website_bookmark_mcp" ]; then
              cp "$DEPLOY_DIR/website_bookmark_mcp/docker-compose.yml" "$DEPLOY_DIR/docker-compose.yml"
              cp "$DEPLOY_DIR/website_bookmark_mcp/nginx.conf" "$DEPLOY_DIR/nginx.conf"
              rm -rf "$DEPLOY_DIR/website_bookmark_mcp"
            fi

            for file in docker-compose.yml nginx.conf; do
              if [ ! -f "$file" ]; then
                echo "Missing deploy file: $file"
                exit 1
              fi
            done

            if [ -z "${{ secrets.POSTGRES_PASSWORD }}" ]; then
              echo "Missing required secret: POSTGRES_PASSWORD"
              exit 1
            fi
            if [ -z "${{ secrets.SESSION_SECRET }}" ]; then
              echo "Missing required secret: SESSION_SECRET"
              exit 1
            fi

            CERT_BASE="/etc/letsencrypt/live/ai.shivaprogramming.com"
            if [ ! -f "$CERT_BASE/fullchain.pem" ] || [ ! -f "$CERT_BASE/privkey.pem" ]; then
              echo "Missing TLS cert files in $CERT_BASE"
              exit 1
            fi

            cat > .env <<'ENVFILE'
            DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            SESSION_COOKIE_SECURE=true
            CORS_ORIGINS=https://ai.shivaprogramming.com,http://localhost:3001,http://127.0.0.1:3001
            ALLOW_LOCAL_FALLBACK=false
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}
            CLIENT_ID_GITHUB=${{ secrets.CLIENT_ID_GITHUB }}
            CLIENT_SECRET_GITHUB=${{ secrets.CLIENT_SECRET_GITHUB }}
            CALLBACK_URL_GITHUB=${{ secrets.CALLBACK_URL_GITHUB }}
            ENVFILE
            chmod 600 .env

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Docker Compose is not installed on VPS"
              exit 1
            fi

            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            mkdir -p certbot
            export APP_IMAGE

            docker stop bookmark-app bookmark-postgres bookmark-nginx 2>/dev/null || true
            docker rm bookmark-app bookmark-postgres bookmark-nginx 2>/dev/null || true

            $COMPOSE_CMD pull
            $COMPOSE_CMD up -d --remove-orphans --no-build

            $COMPOSE_CMD ps

            $COMPOSE_CMD exec -T app node -e "fetch('http://localhost:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
            curl -fkfsS https://ai.shivaprogramming.com/api/health >/dev/null

            echo "Deployment succeeded: https://ai.shivaprogramming.com"
