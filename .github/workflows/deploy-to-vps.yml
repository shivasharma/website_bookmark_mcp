name: Deploy Bookmark MCP

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Build the image and save it as a file
      - name: Build and Archive Image
        run: |
          docker build -t bookmark-app -f server/Dockerfile .
          docker save bookmark-app > bookmark-app.tar

      # 2. Upload the file to the VPS
      - name: Transfer Image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "bookmark-app.tar"
          target: "/tmp"

      # 3. Load the image and restart the container
      - name: Execute Remote Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Loading new image..."
            docker load < /tmp/bookmark-app.tar
            rm /tmp/bookmark-app.tar

            echo "Restarting container..."
            docker stop bookmark-app || true
            docker rm bookmark-app || true

            # Ensure data persistence directory exists
            sudo mkdir -p /opt/bookmark-data
            sudo chmod 777 /opt/bookmark-data

            docker run -d \
              --name bookmark-app \
              --restart always \
              -p 3001:3001 \
              -v /opt/bookmark-data:/app/server/data \
              bookmark-app