name: Deploy to VPS Using Docker Test

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  packages: write

env:
  DEPLOY_DIR: /opt/website_bookmark_mcp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          test -n "${{ secrets.VPS_HOST }}" || { echo "Missing secret: VPS_HOST"; exit 1; }
          test -n "${{ secrets.VPS_USER }}" || { echo "Missing secret: VPS_USER"; exit 1; }
          test -n "${{ secrets.VPS_SSH_KEY }}" || { echo "Missing secret: VPS_SSH_KEY"; exit 1; }
          test -n "${{ secrets.POSTGRES_PASSWORD || secrets.DB_PASSWORD }}" || { echo "Missing secret: POSTGRES_PASSWORD or DB_PASSWORD"; exit 1; }
          test -n "${{ secrets.SESSION_SECRET }}" || { echo "Missing secret: SESSION_SECRET"; exit 1; }
          test -n "${{ secrets.CERTBOT_EMAIL }}" || { echo "Missing secret: CERTBOT_EMAIL"; exit 1; }

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            trap 'rc=$?; echo "[ERROR] line $LINENO exited with status $rc"; if [ -n "${COMPOSE_CMD:-}" ]; then $COMPOSE_CMD ps || true; $COMPOSE_CMD logs --tail=80 app nginx certbot postgres || true; fi; exit $rc' ERR

            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
            APP_IMAGE="ghcr.io/${{ github.repository }}:latest"
            echo "[INFO] Deploy dir: $DEPLOY_DIR"
            echo "[INFO] Image: $APP_IMAGE"

            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            if [ -d "$DEPLOY_DIR/website_bookmark_mcp" ]; then
              cp "$DEPLOY_DIR/website_bookmark_mcp/docker-compose.yml" "$DEPLOY_DIR/docker-compose.yml"
              cp "$DEPLOY_DIR/website_bookmark_mcp/nginx.conf" "$DEPLOY_DIR/nginx.conf"
              rm -rf "$DEPLOY_DIR/website_bookmark_mcp"
            fi

            for file in docker-compose.yml nginx.conf; do
              if [ ! -f "$file" ]; then
                echo "Missing deploy file: $file"
                exit 1
              fi
            done

            DB_PASSWORD_VALUE="${{ secrets.POSTGRES_PASSWORD || secrets.DB_PASSWORD }}"
            if [ -z "$DB_PASSWORD_VALUE" ]; then
              echo "Missing required secret: POSTGRES_PASSWORD or DB_PASSWORD"
              exit 1
            fi
            if [ -z "${{ secrets.SESSION_SECRET }}" ]; then
              echo "Missing required secret: SESSION_SECRET"
              exit 1
            fi
            if [ -z "${{ secrets.CERTBOT_EMAIL }}" ]; then
              echo "Missing required secret: CERTBOT_EMAIL"
              exit 1
            fi

            if command -v systemctl >/dev/null 2>&1; then
              systemctl stop nginx 2>/dev/null || sudo systemctl stop nginx 2>/dev/null || true
              systemctl disable nginx 2>/dev/null || sudo systemctl disable nginx 2>/dev/null || true
            fi

            cat > .env <<'ENVFILE'
            DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD || secrets.DB_PASSWORD }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            SESSION_COOKIE_SECURE=true
            PUBLIC_BASE_URL=https://ai.shivaprogramming.com
            CORS_ORIGINS=https://ai.shivaprogramming.com,http://localhost:3001,http://127.0.0.1:3001
            ALLOW_LOCAL_FALLBACK=false
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_CALLBACK_URL=https://ai.shivaprogramming.com/auth/google/callback
            CLIENT_ID_GITHUB=${{ secrets.CLIENT_ID_GITHUB }}
            CLIENT_SECRET_GITHUB=${{ secrets.CLIENT_SECRET_GITHUB }}
            CALLBACK_URL_GITHUB=https://ai.shivaprogramming.com/auth/github/callback
            ENVFILE
            chmod 600 .env

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Docker Compose is not installed on VPS"
              exit 1
            fi

            echo "[INFO] Logging in to GHCR..."
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            mkdir -p docker-data/letsencrypt docker-data/certbot-www
            export APP_IMAGE

            echo "[INFO] Stopping previous containers..."
            docker stop bookmark-app bookmark-postgres bookmark-nginx bookmark_certbot 2>/dev/null || true
            docker rm bookmark-app bookmark-postgres bookmark-nginx bookmark_certbot 2>/dev/null || true
            docker ps --filter publish=80 --format '{{.ID}}' | xargs -r docker stop || true
            docker ps --filter publish=443 --format '{{.ID}}' | xargs -r docker stop || true

            CERT_FILE="docker-data/letsencrypt/live/ai.shivaprogramming.com/fullchain.pem"
            if [ ! -f "$CERT_FILE" ]; then
              echo "[INFO] Initial cert not found, creating with certbot..."
              docker run --rm -p 80:80 \
                -v "$PWD/docker-data/letsencrypt:/etc/letsencrypt" \
                certbot/certbot:latest certonly --standalone \
                --non-interactive --agree-tos --no-eff-email \
                -m "${{ secrets.CERTBOT_EMAIL }}" \
                -d ai.shivaprogramming.com
            fi

            echo "[INFO] Pulling images and starting stack..."
            $COMPOSE_CMD pull
            $COMPOSE_CMD up -d --remove-orphans --no-build

            $COMPOSE_CMD ps

            echo "[INFO] Running health checks..."
            for i in $(seq 1 20); do
              if $COMPOSE_CMD exec -T app node -e "fetch('http://localhost:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
                break
              fi
              echo "[INFO] app health pending ($i/20)"
              sleep 3
            done
            for i in $(seq 1 20); do
              if curl -fkfsS https://ai.shivaprogramming.com/api/health >/dev/null; then
                break
              fi
              echo "[INFO] public health pending ($i/20)"
              sleep 3
            done
            curl -fkfsS https://ai.shivaprogramming.com/api/health >/dev/null

            echo "Deployment succeeded: https://ai.shivaprogramming.com"
