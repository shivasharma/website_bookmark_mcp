name: Fast Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Grants permission to upload to GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Log in to GitHub's Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push the image to GitHub
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      # Tell the VPS to pull the new image and restart
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Log in to GHCR on the VPS so it can pull the image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker pull ghcr.io/${{ github.repository }}:latest
            
            # Recreate app + postgres stack
            docker network create bookmark-net || true
            docker volume create bookmark-postgres-data || true

            docker stop bookmark-app || true
            docker rm bookmark-app || true
            docker stop bookmark-postgres || true
            docker rm bookmark-postgres || true

            docker run -d \
              --name bookmark-postgres \
              --restart always \
              --network bookmark-net \
              -e POSTGRES_DB=bookmark_mcp \
              -e POSTGRES_USER=postgres \
              -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
              -v bookmark-postgres-data:/var/lib/postgresql/data \
              postgres:16-alpine

            until docker exec bookmark-postgres pg_isready -U postgres -d bookmark_mcp; do
              echo "Waiting for postgres..."
              sleep 2
            done

            docker run -d \
              --name bookmark-app \
              --restart always \
              --network bookmark-net \
              -p 3001:3001 \
              -e NODE_ENV=production \
              -e HOST=0.0.0.0 \
              -e PORT=3001 \
              -e DATABASE_URL=postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@bookmark-postgres:5432/bookmark_mcp \
              -e SESSION_SECRET=${{ secrets.SESSION_SECRET }} \
              -e ALLOW_LOCAL_FALLBACK=false \
              -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              -e GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }} \
              -e GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }} \
              -e GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }} \
              -e GITHUB_CALLBACK_URL=${{ secrets.GITHUB_CALLBACK_URL }} \
              ghcr.io/${{ github.repository }}:latest
