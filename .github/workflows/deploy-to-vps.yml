name: Deploy Bookmark App to VPS Test

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection (verbose)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "Testing SSH to $VPS_USER@$VPS_HOST"
          ssh -vvv -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" "echo '✅ SSH connected to:' \$(hostname)"

      - name: Deploy via SSH (pull, build, restart container)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" << 'EOF'
          set -euxo pipefail

          echo "===== Starting deploy on VPS ====="
          echo "Current user: \$(whoami)"
          echo "Hostname: \$(hostname)"
          echo "Current dir before cd: \$(pwd)"

          # Go to app directory (should already be a git clone of this repo)
          cd "$VPS_APP_DIR"
          echo "Now in app dir: \$(pwd)"

          echo "----- Git status BEFORE pull -----"
          git status || echo "git status failed (maybe not a git repo?)"

          echo "Pulling latest code from origin/main"
          git fetch origin main
          git reset --hard origin/main

          echo "----- Git status AFTER pull -----"
          git status || echo "git status failed"

          echo "Building Docker image (bookmark-app) from repo root using server/Dockerfile"
          docker build -t bookmark-app -f server/Dockerfile . 2>&1

          echo "Stopping existing bookmark-app container if running"
          if [ "\$(docker ps -q -f name=bookmark-app)" ]; then
            docker stop bookmark-app
            docker rm bookmark-app
          fi

          echo "Starting new bookmark-app container on port 3001"
          docker run -d --name bookmark-app -p 3001:3001 \
            -v /opt/bookmark-data:/app/server \
            bookmark-app

          echo "Current running containers:"
          docker ps

          echo "===== Deploy completed successfully ====="
          EOF

